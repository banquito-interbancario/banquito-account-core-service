syntax = "proto3";

package banquito.accounting.v2;

option java_multiple_files = true;
option java_package = "ec.edu.espe.banquito.accountcore.grpc.accounting";
option java_outer_classname = "AccountingServiceProto";

service AccountingService {
  rpc RegisterEntry(AccountingEntryRequest) returns (AccountingEntryResponse);
}

message AccountingEntryRequest {
  string entry_uuid = 1;
  string description = 2;
  string entry_date = 3;
  repeated JournalLine lines = 4;
}

message JournalLine {
  string account_code = 1;
  string movement_type = 2;
  string amount = 3;
  string reference = 4;
}

message AccountingEntryResponse {
  int64 entry_id = 1;
  string entry_uuid = 2;
  string status = 3;
  string validation_result = 4;
  string registered_at = 5;
}
