syntax = "proto3";

package banquito.accountcore.v2;

option java_multiple_files = true;
option java_package = "ec.edu.espe.banquito.accountcore.grpc.accountlookup";
option java_outer_classname = "AccountLookupServiceProto";

service AccountLookupService {
  rpc GetAccountByNumber(GetAccountByNumberRequest) returns (AccountLookupResponse);
}

message GetAccountByNumberRequest {
  string account_number = 1;
}

message AccountLookupResponse {
  int64 account_id = 1;
  string account_number = 2;
  int64 customer_id = 3;
  string status = 4;
}
