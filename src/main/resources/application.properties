server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/banquito}?currentSchema=${DB_SCHEMA:account_core}
spring.datasource.username=${DB_USER:banquito}
spring.datasource.password=${DB_PASS:banquito123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:account_core}

accounting.grpc.host=${ACCOUNTING_GRPC_HOST:localhost}
accounting.grpc.port=${ACCOUNTING_GRPC_PORT:9092}
party.grpc.host=${PARTY_GRPC_HOST:localhost}
party.grpc.port=${PARTY_GRPC_PORT:9093}
notification.grpc.host=${NOTIFICATION_GRPC_HOST:localhost}
notification.grpc.port=${NOTIFICATION_GRPC_PORT:9092}
account-core.grpc.port=${ACCOUNT_CORE_GRPC_PORT:9091}

cut.off.time=${CUT_OFF_TIME:20:00}
account.seed.enabled=${ACCOUNT_SEED_ENABLED:true}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
app.rabbitmq.clearing-queue=${RABBITMQ_CLEARING_QUEUE:clearing.outbound.queue}

api.public.base-url=${API_PUBLIC_BASE_URL:/}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.writer-with-default-pretty-printer=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
